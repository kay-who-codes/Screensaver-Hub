<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Rain</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; }
    .back { position:absolute; top:15px; left:15px; padding:10px 20px; background:rgba(0,0,0,0.6); color:#0f0; border:none; border-radius:4px; cursor:pointer; z-index:10; }
  </style>
</head>
<body>
  <button class="back" onclick="history.back()">← Back</button>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, cols, drops;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cols = Math.floor(w / 20);
      drops = Array(cols).fill(1);
    }

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#0f0';
      ctx.font = '18px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = String.fromCharCode(0x30A0 + Math.random() * 96);
        ctx.fillText(text, i * 20, drops[i] * 20);
        if (drops[i] * 20 > h && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 35);
    window.addEventListener('resize', resize);
    resize();

    // Fullscreen on load
    document.addEventListener('click', () => {
      document.documentElement.requestFullscreen?.();
    }, { once: true });
  </script>
</body>
</html>
