<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Canvas • Cellular Automata</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --bg: #0a0a0f;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg);
            color: #e0e0ff;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 30, 0.85);
            padding: 12px 20px;
            border-radius: 12px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 150, 255, 0.2);
            pointer-events: all;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: opacity 0.4s;
        }
        
        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #a0c0ff;
        }
        
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.9);
            padding: 12px 24px;
            border-radius: 9999px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 150, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: all;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        button {
            background: rgba(100, 150, 255, 0.15);
            color: #a0c0ff;
            border: 1px solid rgba(100, 150, 255, 0.3);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: rgba(100, 150, 255, 0.3);
            transform: translateY(-1px);
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(15, 15, 30, 0.85);
            padding: 18px;
            border-radius: 12px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 150, 255, 0.2);
            pointer-events: all;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .rule-name {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #c0d0ff;
        }
        
        .fade {
            animation: fadeOut 8s forwards;
        }
        
        @keyframes fadeOut {
            to { opacity: 0.1; }
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="overlay">
        <!-- Header -->
        <div class="header" id="header">
            <div class="title">Living Canvas</div>
            <select id="ruleset" style="background:#1a1a2e;color:#a0c0ff;border:none;padding:6px 12px;border-radius:8px;">
                <option value="0">Conway's Game of Life</option>
                <option value="1">Brian's Brain</option>
                <option value="2">Wireworld</option>
            </select>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <button id="playPause">Pause</button>
            <button id="step">Step</button>
            <button id="random">Random</button>
            <button id="clear">Clear</button>
            <button id="fullscreen">Fullscreen</button>
            <input type="range" id="speed" min="1" max="20" value="8" style="width:140px;">
        </div>
        
        <!-- Info Panel -->
        <div class="info-panel" id="infoPanel">
            <div class="rule-name" id="currentRule">Conway's Game of Life</div>
            <div id="ruleDesc">
                Birth on 3 neighbors.<br>
                Survival on 2 or 3 neighbors.<br><br>
                Classic emergent behavior.
            </div>
        </div>
        
        <!-- Status -->
        <div class="status" id="status">Generation: <span id="gen">0</span></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let WIDTH = 180;
        let HEIGHT = 110;
        let CELL_SIZE = 6;
        let grid = [];
        let nextGrid = [];
        let generation = 0;
        let isRunning = true;
        let speed = 80; // ms per tick
        let currentRuleset = 0; // 0: Conway, 1: Brian's Brain, 2: Wireworld
        
        const rulesets = [
            {
                name: "Conway's Game of Life",
                desc: "Birth on exactly 3 neighbors.<br>Survival on 2 or 3 neighbors.<br><br>The most famous cellular automaton.",
                colorAlive: '#60a5fa',
                colorDead: '#1a1a2e'
            },
            {
                name: "Brian's Brain",
                desc: "3 states: Ready (white), Firing (blue), Refractory (dark).<br><br>Beautiful brain-like waves emerge.",
                colorAlive: '#60a5fa',   // firing
                colorDead: '#1a1a2e',    // ready
                colorRef: '#334155'      // refractory
            },
            {
                name: "Wireworld",
                desc: "Electrons travel along wires.<br>States: Empty, Wire, Head, Tail.<br><br>Simulates digital circuits.",
                colorWire: '#64748b',
                colorHead: '#f87171',
                colorTail: '#60a5fa'
            }
        ];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            CELL_SIZE = Math.max(4, Math.floor(Math.min(canvas.width / WIDTH, canvas.height / HEIGHT)));
        }
        
        function initGrid() {
            grid = Array(HEIGHT).fill().map(() => Array(WIDTH).fill(0));
            nextGrid = Array(HEIGHT).fill().map(() => Array(WIDTH).fill(0));
        }
        
        function randomize() {
            for (let y = 0; y < HEIGHT; y++) {
                for (let x = 0; x < WIDTH; x++) {
                    if (currentRuleset === 0) {
                        grid[y][x] = Math.random() > 0.75 ? 1 : 0;
                    } else if (currentRuleset === 1) {
                        grid[y][x] = Math.random() > 0.85 ? 1 : 0; // firing seeds
                    } else {
                        grid[y][x] = Math.random() > 0.6 ? 1 : 0; // wire
                    }
                }
            }
            generation = 0;
        }
        
        function countNeighbors(x, y) {
            let count = 0;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    const nx = (x + dx + WIDTH) % WIDTH;
                    const ny = (y + dy + HEIGHT) % HEIGHT;
                    if (currentRuleset === 0 || currentRuleset === 2) {
                        count += grid[ny][nx] > 0 ? 1 : 0;
                    } else {
                        // Brian's Brain - count firing cells
                        count += (grid[ny][nx] === 1) ? 1 : 0;
                    }
                }
            }
            return count;
        }
        
        function updateGrid() {
            for (let y = 0; y < HEIGHT; y++) {
                for (let x = 0; x < WIDTH; x++) {
                    const neighbors = countNeighbors(x, y);
                    const cell = grid[y][x];
                    
                    if (currentRuleset === 0) { // Conway
                        if (cell === 0 && neighbors === 3) {
                            nextGrid[y][x] = 1;
                        } else if (cell === 1 && (neighbors === 2 || neighbors === 3)) {
                            nextGrid[y][x] = 1;
                        } else {
                            nextGrid[y][x] = 0;
                        }
                    } 
                    else if (currentRuleset === 1) { // Brian's Brain
                        if (cell === 0) { // ready
                            nextGrid[y][x] = (neighbors === 2) ? 1 : 0;
                        } else if (cell === 1) { // firing
                            nextGrid[y][x] = 2;
                        } else { // refractory
                            nextGrid[y][x] = 0;
                        }
                    } 
                    else { // Wireworld
                        if (cell === 0) { // empty
                            nextGrid[y][x] = 0;
                        } else if (cell === 1) { // wire
                            nextGrid[y][x] = 1;
                        } else if (cell === 2) { // head
                            nextGrid[y][x] = 3; // tail
                        } else if (cell === 3) { // tail
                            nextGrid[y][x] = 1; // wire
                        }
                        
                        // Head creation
                        if (cell === 1) {
                            let headNeighbors = 0;
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    if (dx === 0 && dy === 0) continue;
                                    const nx = (x + dx + WIDTH) % WIDTH;
                                    const ny = (y + dy + HEIGHT) % HEIGHT;
                                    if (grid[ny][nx] === 2) headNeighbors++;
                                }
                            }
                            if (headNeighbors === 1 || headNeighbors === 2) {
                                nextGrid[y][x] = 2; // become head
                            }
                        }
                    }
                }
            }
            
            // Swap grids
            [grid, nextGrid] = [nextGrid, grid];
            generation++;
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const offsetX = Math.floor((canvas.width - WIDTH * CELL_SIZE) / 2);
            const offsetY = Math.floor((canvas.height - HEIGHT * CELL_SIZE) / 2);
            
            for (let y = 0; y < HEIGHT; y++) {
                for (let x = 0; x < WIDTH; x++) {
                    const cell = grid[y][x];
                    let color = '#1a1a2e';
                    
                    if (currentRuleset === 0) { // Conway
                        color = cell ? rulesets[0].colorAlive : rulesets[0].colorDead;
                    } 
                    else if (currentRuleset === 1) { // Brian's Brain
                        if (cell === 1) color = '#60a5fa';
                        else if (cell === 2) color = '#475569';
                        else color = '#1a1a2e';
                    } 
                    else { // Wireworld
                        if (cell === 1) color = '#64748b';      // wire
                        else if (cell === 2) color = '#f87171';  // head
                        else if (cell === 3) color = '#60a5fa';  // tail
                    }
                    
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        offsetX + x * CELL_SIZE, 
                        offsetY + y * CELL_SIZE, 
                        CELL_SIZE - 1, 
                        CELL_SIZE - 1
                    );
                }
            }
        }
        
        function gameLoop() {
            if (isRunning) {
                updateGrid();
            }
            draw();
            document.getElementById('gen').textContent = generation;
        }
        
        function setRuleset(index) {
            currentRuleset = index;
            document.getElementById('currentRule').textContent = rulesets[index].name;
            document.getElementById('ruleDesc').innerHTML = rulesets[index].desc;
            randomize();
        }
        
        // Event Listeners
        function setupControls() {
            document.getElementById('playPause').addEventListener('click', () => {
                isRunning = !isRunning;
                document.getElementById('playPause').textContent = isRunning ? 'Pause' : 'Play';
            });
            
            document.getElementById('step').addEventListener('click', () => {
                if (!isRunning) {
                    updateGrid();
                    draw();
                }
            });
            
            document.getElementById('random').addEventListener('click', randomize);
            
            document.getElementById('clear').addEventListener('click', () => {
                initGrid();
                generation = 0;
            });
            
            document.getElementById('fullscreen').addEventListener('click', () => {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            });
            
            const speedSlider = document.getElementById('speed');
            speedSlider.addEventListener('input', () => {
                speed = 220 - (speedSlider.value * 10);
            });
            
            const rulesSelect = document.getElementById('ruleset');
            rulesSelect.addEventListener('change', (e) => {
                setRuleset(parseInt(e.target.value));
            });
            
            // Mouse drawing
            let isDrawing = false;
            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                paint(e);
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (isDrawing) paint(e);
            });
            
            window.addEventListener('mouseup', () => isDrawing = false);
            
            function paint(e) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                
                const offsetX = Math.floor((canvas.width - WIDTH * CELL_SIZE) / 2);
                const offsetY = Math.floor((canvas.height - HEIGHT * CELL_SIZE) / 2);
                
                const x = Math.floor((mx - offsetX) / CELL_SIZE);
                const y = Math.floor((my - offsetY) / CELL_SIZE);
                
                if (x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT) {
                    if (currentRuleset === 1) {
                        grid[y][x] = 1; // fire
                    } else if (currentRuleset === 2) {
                        grid[y][x] = 2; // head
                    } else {
                        grid[y][x] = 1;
                    }
                }
            }
            
            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') {
                    isRunning = !isRunning;
                    document.getElementById('playPause').textContent = isRunning ? 'Pause' : 'Play';
                    e.preventDefault();
                }
                if (e.key === 'r' || e.key === 'R') randomize();
                if (e.key === 'c' || e.key === 'C') {
                    initGrid();
                    generation = 0;
                }
            });
            
            // Auto-hide header after inactivity
            let timeout;
            function resetTimeout() {
                document.getElementById('header').style.opacity = 1;
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    document.getElementById('header').style.opacity = 0.15;
                }, 8000);
            }
            
            document.addEventListener('mousemove', resetTimeout);
            resetTimeout();
        }
        
        // Initialize
        function init() {
            resize();
            initGrid();
            randomize();
            setRuleset(0);
            setupControls();
            
            // Main loop
            setInterval(() => {
                gameLoop();
            }, 40); // smooth drawing
            
            // Simulation tick (variable speed)
            setInterval(() => {
                if (isRunning) {
                    updateGrid();
                }
            }, 60); // base tick rate, speed slider affects visual feel more
            
            // Periodic random boost
            setInterval(() => {
                if (Math.random() < 0.15 && isRunning) {
                    randomize();
                }
            }, 45000);
            
            window.addEventListener('resize', () => {
                resize();
            });
        }
        
        window.onload = init;
    </script>
</body>
</html>
