<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screensaver Hub</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #00ff88;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.95);
      padding: 1rem;
      text-align: center;
      z-index: 100;
      border-bottom: 1px solid #222;
    }
    h1 { font-size: 2.2rem; }
    .hub {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      padding: 6rem 2rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: #111;
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #222;
    }
    .card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(0, 255, 136, 0.15);
    }
    .preview {
      height: 160px;
      background: #1a1a1a;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
    }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Screensaver Container */
    .saver {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }
    .saver.active {
      display: block;
    }
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      z-index: 300;
    }
  </style>
</head>
<body>

  <!-- HUB MENU -->
  <header>
    <h1>🖥️ Screensaver Hub</h1>
    <p>Select a screensaver</p>
  </header>

  <div class="hub" id="hub">
    <div class="card" onclick="showSaver('matrix')">
      <div class="preview">🌧️</div>
      <h2>Matrix Rain</h2>
      <p>Classic green digital rain</p>
      <button>Launch</button>
    </div>

    <div class="card" onclick="showSaver('particles')">
      <div class="preview">✨</div>
      <h2>Particle Field</h2>
      <p>Interactive glowing particles</p>
      <button>Launch</button>
    </div>

    <div class="card" onclick="showSaver('clock')">
      <div class="preview">⏰</div>
      <h2>Hypnotic Clock</h2>
      <p>Smooth analog clock</p>
      <button>Launch</button>
    </div>
  </div>

  <!-- MATRIX SAVER -->
  <div id="matrix" class="saver">
    <button class="back-btn" onclick="hideAll()">← Back to Hub</button>
    <canvas id="matrix-canvas"></canvas>
  </div>

  <!-- PARTICLES SAVER -->
  <div id="particles" class="saver">
    <button class="back-btn" onclick="hideAll()">← Back to Hub</button>
    <canvas id="particles-canvas"></canvas>
  </div>

  <!-- CLOCK SAVER -->
  <div id="clock" class="saver">
    <button class="back-btn" onclick="hideAll()">← Back to Hub</button>
    <canvas id="clock-canvas"></canvas>
  </div>

  <script>
    // Utility
    function hideAll() {
      document.querySelectorAll('.saver').forEach(s => s.classList.remove('active'));
      document.getElementById('hub').style.display = 'grid';
      document.exitFullscreen?.();
    }

    function showSaver(id) {
      document.getElementById('hub').style.display = 'none';
      document.getElementById(id).classList.add('active');
      
      // Try fullscreen
      setTimeout(() => {
        const saver = document.getElementById(id);
        if (saver.requestFullscreen) saver.requestFullscreen().catch(() => {});
      }, 300);
    }

    // ==================== MATRIX RAIN ====================
    function startMatrix() {
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const cols = Math.floor(canvas.width / 20);
      const drops = Array(cols).fill(1);

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff88';
        ctx.font = '18px monospace';

        for (let i = 0; i < drops.length; i++) {
          const text = String.fromCharCode(0x30A0 + Math.random() * 96);
          ctx.fillText(text, i * 20, drops[i] * 20);
          
          if (drops[i] * 20 > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }
      setInterval(draw, 35);
    }

    // ==================== PARTICLES ====================
    function startParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 3.5 + 1;
          this.speedX = Math.random() * 2.5 - 1.25;
          this.speedY = Math.random() * 2.5 - 1.25;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
          if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        draw() {
          ctx.fillStyle = '#00ffff';
          ctx.shadowBlur = 15;
          ctx.shadowColor = '#00ffff';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (let i = 0; i < 180; i++) particles.push(new Particle());

      function animate() {
        ctx.fillStyle = 'rgba(10,10,10,0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let p of particles) {
          p.update();
          p.draw();
        }
        requestAnimationFrame(animate);
      }
      animate();
    }

    // ==================== HYPNOTIC CLOCK ====================
    function startClock() {
      const canvas = document.getElementById('clock-canvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function drawClock() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const radius = Math.min(cx, cy) * 0.8;

        const now = new Date();
        const sec = now.getSeconds() + now.getMilliseconds() / 1000;
        const min = now.getMinutes() + sec / 60;
        const hour = now.getHours() % 12 + min / 60;

        // Background circle
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Hour hand
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + radius * 0.5 * Math.cos((hour * 30 - 90) * Math.PI / 180),
                   cy + radius * 0.5 * Math.sin((hour * 30 - 90) * Math.PI / 180));
        ctx.stroke();

        // Minute hand
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + radius * 0.75 * Math.cos((min * 6 - 90) * Math.PI / 180),
                   cy + radius * 0.75 * Math.sin((min * 6 - 90) * Math.PI / 180));
        ctx.stroke();

        // Second hand
        ctx.strokeStyle = '#ff0088';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + radius * 0.85 * Math.cos((sec * 6 - 90) * Math.PI / 180),
                   cy + radius * 0.85 * Math.sin((sec * 6 - 90) * Math.PI / 180));
        ctx.stroke();
      }

      setInterval(drawClock, 50);
    }

    // Start all canvases when page loads
    window.onload = () => {
      startMatrix();
      startParticles();
      startClock();
    };
  </script>
</body>
</html>
