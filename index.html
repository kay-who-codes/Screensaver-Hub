<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screensaver Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🖥️ Screensaver Hub</h1>
    <p>Choose a screensaver</p>
  </header>

  <main class="grid" id="hub">
    <div class="card" onclick="launch('screensavers/matrix/')">
      <div class="preview">🌧️</div>
      <h2>Matrix Rain</h2>
      <p>Classic green code rain</p>
      <button>Launch</button>
    </div>

    <div class="card" onclick="launch('screensavers/particles/')">
      <div class="preview">✨</div>
      <h2>Particle Field</h2>
      <p>Glowing interactive particles</p>
      <button>Launch</button>
    </div>

    <div class="card" onclick="launch('screensavers/clock/')">
      <div class="preview">⏰</div>
      <h2>Hypnotic Clock</h2>
      <p>Smooth analog clock</p>
      <button>Launch</button>
    </div>
  </main>

  <footer>
    <p>Add more savers by creating new folders inside <code>screensavers/</code></p>
  </footer>

  <script>
    function launch(path) {
      window.open(path, '_blank');
    }
  </script>
</body>
</html>
