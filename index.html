<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screensaver Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🖥️ Screensaver Hub</h1>
    <p>Choose a screensaver</p>
  </header>

  <main class="grid">
    <div class="card" onclick="launch('screensavers/ant/')"><div class="preview">🐜</div><h2>Ant</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/brians-brain/')"><div class="preview">🧠</div><h2>Brian's Brain</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/game-of-life/')"><div class="preview">🌐</div><h2>Game of Life</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/wireworld/')"><div class="preview">⚡</div><h2>Wireworld</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/matrix/')"><div class="preview">🌧️</div><h2>Matrix</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/aquarium/')"><div class="preview">🐠</div><h2>Aquarium</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/fireworks/')"><div class="preview">🎆</div><h2>Fireworks</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/pictures/')"><div class="preview">🖼️</div><h2>Pictures</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/dvd/')"><div class="preview">📀</div><h2>DVD Logo</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/particles/')"><div class="preview">✨</div><h2>Particles</h2><button>Launch</button></div>
    <div class="card" onclick="launch('screensavers/maths/')"><div class="preview">📐</div><h2>Maths</h2><button>Launch</button></div>
  </main>

  <footer>
    <p>Add more savers by creating new folders inside <code>screensavers/</code></p>
  </footer>

  <script>
    function launch(path) {
      window.open(path, '_blank');
    }
  </script>
</body>
</html>
